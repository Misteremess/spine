name: Deploy Spine

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/mobile/**"
      - "packages/shared/**"
      - "docker-compose.production.yml"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-spine
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # global-setup.ts no fija usuario en la connection string; sin esto
      # `pg` usa el usuario del SO ("runner"), que no existe como rol en el
      # contenedor de Postgres del job (solo existe "postgres").
      PGUSER: postgres
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-spine.hyperfocus.es
          tags: |
            ghcr.io/misteremess/spine-${{ matrix.app }}:latest
            ghcr.io/misteremess/spine-${{ matrix.app }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: "[debug temporal] huella pública de VPS_SSH_KEY"
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: echo "$SSH_KEY" | ssh-keygen -lf /dev/stdin
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash ~/spine/deploy/docker/deploy.sh
